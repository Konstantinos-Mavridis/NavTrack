name: "🙋 Question / Help"
description: Ask a question about setup, usage, or the codebase.
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Not sure how something works, or stuck on a configuration issue? Ask here.

  - type: textarea
    id: question
    attributes:
      label: "Your question"
      description: "Be as specific as possible — include what you tried and what you expected."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options:
        - Quick Start / Docker Compose
        - Backend API
        - Frontend UI
        - Worker / scheduling
        - NAV sync
        - Import / Export
        - CI / workflows
        - Versioning & releases
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "NavTrack version"
      placeholder: "e.g. v0.0.4"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Additional context"
      description: "Relevant logs, screenshots, or environment details."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Before submitting"
      options:
        - label: "I checked the README and existing issues for an answer."
          required: true
