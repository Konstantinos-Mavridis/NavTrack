name: All Containers – Docker Images

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Manually trigger a build of all three images'
        required: false
        default: 'true'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch:
    name: Dispatch all image builds
    runs-on: ubuntu-latest
    permissions:
      actions: write
    strategy:
      matrix:
        workflow:
          - docker-backend.yml
          - docker-frontend.yml
          - docker-worker.yml
    steps:
      - uses: actions/github-script@v7.0.1
        with:
          script: |
            // Resolve latest semver tag, fall back to main
            let ref = 'main';
            try {
              const tags = await github.rest.repos.listTags({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                per_page: 10,
              });
              const semver = tags.data
                .map(t => t.name)
                .filter(n => /^v\d+\.\d+\.\d+$/.test(n))
                .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }))[0];
              if (semver) ref = `refs/tags/${semver}`;
            } catch (e) {
              core.warning(`Could not resolve latest tag, falling back to main: ${e}`);
            }
            core.info(`Dispatching ${{ matrix.workflow }} at ref: ${ref}`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: '${{ matrix.workflow }}',
              ref,
            });
            console.log('Triggered ${{ matrix.workflow }}');
