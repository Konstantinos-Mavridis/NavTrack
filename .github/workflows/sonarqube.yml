name: SonarQube Analysis

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'worker/**'
      - '.github/workflows/sonarqube.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'worker/**'
      - '.github/workflows/sonarqube.yml'
  schedule:
    # Full weekly scan every Monday 09:00 UTC (after CodeQL at 08:00)
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── 0. Detect which service trees changed ─────────────────────────────────────────────────────────────────────────────────────
jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend  || steps.manual.outputs.backend  }}
      frontend: ${{ steps.filter.outputs.frontend || steps.manual.outputs.frontend }}
      worker:   ${{ steps.filter.outputs.worker   || steps.manual.outputs.worker   }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths (push / pull_request only)
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            worker:
              - 'worker/**'

      - name: Mark all services changed (schedule / workflow_dispatch)
        id: manual
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          echo "backend=true"  >> $GITHUB_OUTPUT
          echo "frontend=true" >> $GITHUB_OUTPUT
          echo "worker=true"   >> $GITHUB_OUTPUT

  # ── 1. Backend (NestJS / TypeScript) ──────────────────────────────────────────────────────────────────────────────────────────
  sonar-backend:
    name: Sonar – backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        # --include=dev guarantees devDependencies (ts-jest, @nestjs/testing, etc.)
        # are always installed regardless of NODE_ENV.
        run: npm install --include=dev

      - name: Run tests with coverage
        env:
          NODE_ENV: test
        run: npm run test:cov

      - name: SonarQube Scan – backend
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.projectKey=navtrack-backend
            -Dsonar.projectName="NavTrack – Backend"
            -Dsonar.organization=konstantinos-mavridis
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts,**/*.e2e-spec.ts,**/dist/**,**/coverage/**
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.tsconfigPath=tsconfig.json
            -Dsonar.qualitygate.wait=false
            -Dsonar.pullrequest.github.summary_comment=false

  # ── 2. Frontend (React / TypeScript / Vite) ──────────────────────────────────────────────────────────────────────────────────────────
  sonar-frontend:
    name: Sonar – frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # --include=dev guarantees devDependencies (@vitest/coverage-v8, jsdom, etc.)
        # are always installed regardless of NODE_ENV.
        run: npm install --include=dev

      - name: Run tests with coverage
        env:
          NODE_ENV: test
        run: npm run test:cov

      - name: SonarQube Scan – frontend
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=navtrack-frontend
            -Dsonar.projectName="NavTrack – Frontend"
            -Dsonar.organization=konstantinos-mavridis
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/dist/**,**/coverage/**
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.tsconfigPath=tsconfig.json
            -Dsonar.qualitygate.wait=false
            -Dsonar.pullrequest.github.summary_comment=false

  # ── 3. Worker (Python 3.14 / APScheduler) ──────────────────────────────────────────────────────────────────────────────────────────
  sonar-worker:
    name: Sonar – worker
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'

    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: worker/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=worker --cov-report=xml:coverage.xml

      - name: SonarQube Scan – worker
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: worker
          args: >
            -Dsonar.projectKey=navtrack-worker
            -Dsonar.projectName="NavTrack – Worker"
            -Dsonar.organization=konstantinos-mavridis
            -Dsonar.sources=.
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,**/tests/**
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/test_*.py
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.14
            -Dsonar.qualitygate.wait=false
            -Dsonar.pullrequest.github.summary_comment=false
