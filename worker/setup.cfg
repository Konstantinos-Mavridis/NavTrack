[coverage:run]
# Tell coverage exactly which source file to instrument.
# Without this, `pytest --cov=.` crawls everything including
# tests/ and stubs, producing 0% or misleading numbers.
source = worker
omit =
    tests/*
    conftest.py

[coverage:report]
# Lines that are untestable boilerplate (module-level guards, etc.)
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.
    raise NotImplementedError

[coverage:xml]
# Output path matches what sonarqube.yml passes to
# -Dsonar.python.coverage.reportPaths
output = coverage.xml
